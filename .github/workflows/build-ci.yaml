name: "java-gradle-plain-spring-boot-workflow"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  # ==========================================
  # JOB 1: Build & Compile
  # ==========================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version : '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests & Build Executable JAR
        run: ./gradlew clean build jacocoTestReport

      - name: Log test report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          check_name: "JUnit Status Report"
          report_paths: '**/build/test-results/test/*.xml'

      # Share the workspace files so Sonar and Publish don't have to re-compile anything
      - name: Temporarily Share Compiled Workspace
        uses: actions/upload-artifact@v4
        with:
          name: compiled-workspace
          path: |
            .
            ! .git
          retention-days: 1

  # ==========================================
  # JOB 2: Publish Artifact (Built-in)
  # ==========================================
  publish:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ steps.find-jar.outputs.JAR_NAME }}
    steps:
      - name: Download Workspace Output
        uses: actions/download-artifact@v4
        with:
          name: compiled-workspace

      - name: Find Application JAR Name
        id: find-jar
        run: |
          JAR_PATH=$(find build/libs -maxdepth 1 -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          JAR_NAME=$(basename "$JAR_PATH")
          echo "JAR_NAME=$JAR_NAME" >> $GITHUB_OUTPUT
          echo "Found compiled app JAR: $JAR_NAME"

      - name: Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-app-jar
          path: build/libs/*.jar
          retention-days: 1

  # ==========================================
  # JOB 3: Sonar Cloud Scan (Runs in parallel with Publish)
  # ==========================================
  sonar_scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Workspace Output
        uses: actions/download-artifact@v4
        with:
          name: compiled-workspace

      - name: SonarCloud Scan Analysis
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # JOB 4: Download Staged Artifact
  # ==========================================
  download_artifact:
    needs: [publish, sonar_scan]
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ needs.publish.outputs.jar_name }}
    steps:
      - name: Download Production Artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-app-jar
          path: my-running-app

      - name: Verify Downloaded Files
        run: ls -la my-running-app

      # Share the download environment forward to the standalone runner block
      - name: Staging Files for Deployment
        uses: actions/upload-artifact@v4
        with:
          name: staged-deployment-package
          path: my-running-app/
          retention-days: 1

  # ==========================================
  # JOB 5: Deploy & Run Application
  # ==========================================
  deploy_and_run:
    needs: [publish, download_artifact]
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21 Runtime
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Pull Staged Deployment Package
        uses: actions/download-artifact@v4
        with:
          name: staged-deployment-package
          path: target-runtime

      - name: Launch & Verify API Context
        run: |
          cd target-runtime
          
          # 1. Clear out port 8081 if anything is hanging from background tasks
          echo "Checking port 8081 availability..."
          fuser -k 8081/tcp || echo "Port 8081 is clear."
          
          # 2. Launch your embedded Tomcat spring instance
          echo "Launching application on port 8081..."
          java -jar "${{ needs.publish.outputs.jar_name }}" &
          
          # 3. Wait for full server context bootstrapping
          echo "Waiting 20 seconds for internal application initialization..."
          sleep 20
          
          # 4. Step A: POST test payload to create the Amazon entity record
          echo "Executing HTTP POST Request..."
          curl -i -X POST \
            -H "Content-Type: application/json" \
            -d '{"custName":"Amazon","email":"amazon-markiting@amazon.com","location":"Ind-Bangalore"}' \
            http://localhost:8081/api/customers
          
          echo -e "\n--------------------------------------------------"
          
          # 5. Step B: GET test request against identical URL to verify data state persistence
          echo "Executing HTTP GET Request to verify persistence..."
          curl -i -X GET http://localhost:8081/api/customers