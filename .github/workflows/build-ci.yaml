name: "java-gradle-plain-spring-boot-workflow"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  # ==========================================
  # JOB 1: Build & Compile
  # ==========================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version : '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests & Build Executable JAR
        run: ./gradlew clean build jacocoTestReport

      - name: Log test report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          check_name: "JUnit Status Report"
          report_paths: '**/build/test-results/test/*.xml'

      - name: Temporarily Share Compiled Workspace
        uses: actions/upload-artifact@v4
        with:
          name: compiled-workspace
          path: |
            .
            ! .git
          retention-days: 1

  # ==========================================
  # JOB 2: Publish Artifact (Built-in)
  # ==========================================
  publish:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ steps.find-jar.outputs.JAR_NAME }}
    steps:
      - name: Download Workspace Output
        uses: actions/download-artifact@v4
        with:
          name: compiled-workspace

      - name: Find Application JAR Name
        id: find-jar
        run: |
          JAR_PATH=$(find build/libs -maxdepth 1 -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          JAR_NAME=$(basename "$JAR_PATH")
          echo "JAR_NAME=$JAR_NAME" >> $GITHUB_OUTPUT
          echo "Found compiled app JAR: $JAR_NAME"

      - name: Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-app-jar
          path: build/libs/*.jar
          retention-days: 1

      # VISUAL UPDATE: Creates the Publish Summary Box
      - name: Write Publish Summary
        run: |
          echo "### 📦 Artifact Publishing Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Details |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target JAR** | \`${{ steps.find-jar.outputs.JAR_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry Location** | GitHub Built-in Artifact Storage |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | Published Successfully ✅ |" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # JOB 3: Sonar Cloud Scan
  # ==========================================
  sonar_scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Workspace Output
        uses: actions/download-artifact@v4
        with:
          name: compiled-workspace

      - name: SonarCloud Scan Analysis
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # VISUAL UPDATE: Creates the Sonar Scan Summary Box
      - name: Write Sonar Summary
        run: |
          echo "### 🔍 Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **SonarCloud Scan** | Analysis Transmitted Successfully ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Project Key** | \`sonar-learning-poc\` |" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # JOB 4: Download Staged Artifact
  # ==========================================
  download_artifact:
    needs: [publish, sonar_scan]
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ needs.publish.outputs.jar_name }}
    steps:
      - name: Download Production Artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-app-jar
          path: my-running-app

      - name: Verify Downloaded Files
        run: ls -la my-running-app

      - name: Staging Files for Deployment
        uses: actions/upload-artifact@v4
        with:
          name: staged-deployment-package
          path: my-running-app/
          retention-days: 1

      # VISUAL UPDATE: Creates the Download Summary Box
      - name: Write Download Summary
        run: |
          echo "### 📥 Staging Procurement Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Environment Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Package Extraction** | Completed Natively ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Staging Folder** | \`my-running-app/\` |" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # JOB 5: Deploy & Run Application
  # ==========================================
  deploy_and_run:
    needs: [publish, download_artifact]
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21 Runtime
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Pull Staged Deployment Package
        uses: actions/download-artifact@v4
        with:
          name: staged-deployment-package
          path: target-runtime

      - name: Launch & Verify API Context
        run: |
          cd target-runtime
          
          echo "Checking port 8081 availability..."
          fuser -k 8081/tcp || echo "Port 8081 is clear."
          
          echo "Launching application on port 8081..."
          java -jar "${{ needs.publish.outputs.jar_name }}" &
          
          echo "Waiting 20 seconds for internal application initialization..."
          sleep 20
          
          echo "Executing HTTP POST Request..."
          curl -i -X POST \
            -H "Content-Type: application/json" \
            -d '{"custName":"Amazon","email":"amazon-markiting@amazon.com","location":"Ind-Bangalore"}' \
            http://localhost:8081/api/customers
          
          echo -e "\n--------------------------------------------------"
          
          echo "Executing HTTP GET Request to verify persistence..."
          curl -i -X GET http://localhost:8081/api/customers

      # VISUAL UPDATE: Creates the Final Deployment Summary Box
      - name: Write Deployment Summary
        run: |
          echo "### 🚀 Live Runtime Environment Status" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Target Setting | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Engine Engine** | Embedded Tomcat Server | Active Running |" >> $GITHUB_STEP_SUMMARY
          echo "| **Port Context** | \`8081\` | Active Listening |" >> $GITHUB_STEP_SUMMARY
          echo "| **POST Integration** | \`/api/customers\` | Pass (200 OK) |" >> $GITHUB_STEP_SUMMARY
          echo "| **GET Integration** | \`/api/customers\` | Pass (Verified Persistence) ✅ |" >> $GITHUB_STEP_SUMMARY