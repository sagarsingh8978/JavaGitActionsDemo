name: "java-gradle-plain-workflow"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version : '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 1: Compile code and generate test report natively
      - name: Run Tests & Generate Coverage
        run: ./gradlew clean test jacocoTestReport

      # Step 2: Scan with the standalone container to completely bypass Gradle 9 bugs
      - name: SonarCloud Scan Analysis
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Log test report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          check_name: "JUnit Status Report"
          report_paths: '**/build/test-results/test/*.xml'